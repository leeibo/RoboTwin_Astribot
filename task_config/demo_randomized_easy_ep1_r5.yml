# One-episode cluttered collection config matching demo_randomized_easy_ep200_r5.yml.
render_freq: 0
table_shape: fan
fan_center_on_robot: true
fan_outer_radius: 0.9
fan_inner_radius: 0.3
fan_angle_deg: 180
fan_center_deg: 90
rotate_object_margin_deg: 20
rotate_theta_reference_fan_angle_deg: 180
rotate_theta_shared_ratio: 1.0
rotate_scan_aabb_visible_ratio_threshold: 0.4
rotate_clutter_min_radius: 0.55
rotate_cluttered_numbers: 5
rotate_clutter_candidate_count: 6
rotate_clutter_radial_bias_power: 0.45
episode_num: 1
max_seed_tries: 1000
use_seed: false
save_freq: 15
embodiment: [astribot_texture]
language_num: 100
domain_randomization:
  random_background: false
  cluttered_table: true
  clean_background_rate: 0
  random_head_camera_dis: 0
  random_table_height: 0.0
  random_light: false
  crazy_random_light_rate: 0
camera:
  head_camera_type: Large
  wrist_camera_type: D435
  collect_head_camera: true
  collect_wrist_camera: true
  collect_top_view_camera: true
  top_view_camera:
    w: 512
    h: 384
    fovy: 60
    position: [0.0, -0.1, 1.70]
    target: [0.0, 0.0, 0.74]
    left: [-1.0, 0.0, 0.0]
data_type:
  rgb: true
  top_view: true
  top_view_snapshot_freq: 15
  third_view: false
  depth: false
  pointcloud: false
  observer: false
  endpose: true
  qpos: true
  mesh_segmentation: false
  actor_segmentation: false
pcd_down_sample_num: 1024
pcd_crop: true
save_path: ./data
clear_cache_freq: 5
collect_data: true
eval_video_log: true
