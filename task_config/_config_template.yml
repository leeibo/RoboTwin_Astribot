render_freq: 0
episode_num: 50
use_seed: false
save_freq: 15
# Table options:
# table_shape: rect  # rect or fan
# fan_center_on_robot: true
# fan_outer_radius: 0.9
# fan_inner_radius: 0.3
# fan_angle_deg: 200
# fan_center_deg: 90
# rotate_object_margin_deg: 10  # fan half-angle minus this margin (deg)
# rotate_theta_reference_fan_angle_deg: 220
# rotate_theta_shared_ratio: 1.0  # one shared theta setting for all rotate tasks
# difficulty_tag: medium_fan200  # optional; if unset, auto inferred from fan_angle_deg
embodiment:
- aloha-agilex
language_num: 100
domain_randomization:
  random_background: false
  cluttered_table: false
  clean_background_rate: 0
  random_head_camera_dis: 0
  random_table_height: 0
  random_light: false
  crazy_random_light_rate: 0
camera:
  head_camera_type: D435
  wrist_camera_type: D435
  collect_head_camera: true
  collect_wrist_camera: true
data_type:
  rgb: true
  third_view: false
  depth: false
  pointcloud: false
  endpose: true
  qpos: true
  mesh_segmentation: false
  actor_segmentation: false
pcd_down_sample_num: 1024
pcd_crop: true
save_path: ./data
clear_cache_freq: 1
collect_data: true
eval_video_log: true
