# Clean one-episode DYJ-style config for experimental information-gathering tasks.
render_freq: 0
visualize_markers: false
fan_center_on_robot: true
fan_outer_radius: 0.9
fan_inner_radius: 0.3
fan_angle_deg: 180
fan_center_deg: 90
rotate_stage1_upper_head_joint2_rad: 0.47
fan_double_upper_theta_offset_deg: 20.0
rotate_object_margin_deg: 20
rotate_theta_reference_fan_angle_deg: 180
rotate_theta_shared_ratio: 1.0
task_table_configs:
  fan:
    table_shape: fan
    fan_center_on_robot: true
    fan_outer_radius: 0.9
    fan_inner_radius: 0.3
    fan_angle_deg: 180
    fan_center_deg: 90
    rotate_object_margin_deg: 20
    rotate_theta_reference_fan_angle_deg: 180
    rotate_theta_shared_ratio: 1.0
rotate_scan_aabb_visible_ratio_threshold: 0.4
rotate_clutter_min_radius: 0.55
rotate_cluttered_numbers: 5
rotate_upper_cluttered_numbers: 3
rotate_clutter_candidate_count: 12
rotate_clutter_radial_bias_power: 0.45
rotate_clutter_max_tries: 300
rotate_clutter_is_static: true
rotate_clutter_object_pool: unused_task_objects
difficulty_tag: info_gathering_demo
episode_num: 1
max_seed_tries: 600
use_seed: false
save_freq: 15
embodiment: [astribot_texture]
language_num: 100
domain_randomization:
  random_background: false
  cluttered_table: true
  clean_background_rate: 0
  random_head_camera_dis: 0
  random_table_height: 0.0
  random_light: false
  crazy_random_light_rate: 0.0
camera:
  head_camera_type: Large
  wrist_camera_type: D435
  collect_head_camera: true
  collect_wrist_camera: false
  collect_top_view_camera: false
  top_view_camera:
    w: 512
    h: 384
    fovy: 55
    position: [0.0, -0.35, 1.80]
    target: [0.0, 0.0, 0.74]
    left: [-1.0, 0.0, 0.0]
  observer_camera:
    w: 1200
    h: 1000
    fovy: 65
    position: [0.0, 0.73, 1.7]
    forward: [0.0, -1.0, -1.02]
    left: [1.0, 0.0, 0.0]
data_type:
  rgb: true
  top_view: false
  top_view_snapshot_freq: 15
  extra_view_snapshot_freq: 15
  observer_camera: false
  world_camera1: true
  third_view: false
  depth: false
  pointcloud: false
  observer: false
  endpose: true
  qpos: true
  mesh_segmentation: false
  actor_segmentation: false
pcd_down_sample_num: 1024
pcd_crop: true
save_path: ./data
clear_cache_freq: 5
collect_data: true
eval_video_log: true
save_auxiliary_videos: false
